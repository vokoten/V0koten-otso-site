<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v0koten otso site</title>
    <style>
        :root {
            --bg-grad: linear-gradient(45deg, #e0c3fc 0%, #8ec5fc 100%);
            --text-color: #1c1e21;
            --glass-bg: rgba(255, 255, 255, 0.3);
            --glass-border: rgba(255, 255, 255, 0.4);
            --nav-bg: rgba(255, 255, 255, 0.2);
            --accent: #6c5ce7;
            --btn-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-grad: linear-gradient(45deg, #0f172a 0%, #1e293b 100%);
            --text-color: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(0, 0, 0, 0.3);
            --accent: #a29bfe;
            --btn-text: #18191a;
        }

        * { box-sizing: border-box; transition: background 0.4s, color 0.4s, transform 0.3s, opacity 0.4s; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: var(--bg-grad);
            background-attachment: fixed;
            color: var(--text-color);
            overflow-x: hidden;
        }

        .bg-circles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .circle {
            position: absolute; border-radius: 50%; background: var(--accent);
            filter: blur(80px); opacity: 0.3; animation: move 20s infinite alternate ease-in-out;
        }
        .c1 { width: 450px; height: 450px; top: -100px; right: -100px; }
        .c2 { width: 350px; height: 350px; bottom: -50px; left: -50px; animation-duration: 25s; }

        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(100px, 100px); } }

        nav {
            position: fixed; top: 0; width: 100%; padding: 15px;
            display: flex; justify-content: center; align-items: center; gap: 20px;
            background: var(--nav-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }
        nav a { color: var(--text-color); text-decoration: none; font-weight: 600; cursor: pointer; font-size: 0.9rem; padding: 5px 10px; border-bottom: 2px solid transparent; }
        nav a.active-link { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .theme-btn { background: var(--text-color); color: var(--btn-text); border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        header { padding: 180px 20px 80px; text-align: center; }
        section { padding: 40px 20px; min-height: 300px; }

        .container {
            max-width: 800px; margin: 0 auto; padding: 40px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1 !important; transform: translateY(0) !important; }

        .history-item { margin-bottom: 20px; padding-left: 20px; border-left: 3px solid var(--accent); }
        .history-date { font-weight: bold; color: var(--accent); font-size: 0.9rem; }

        form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea { padding: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); border-radius: 15px; color: var(--text-color); outline: none; }
        .btn-submit { background: var(--accent); color: white; padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }

        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: var(--accent); color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; z-index: 2000; }
        .back-to-top.show { opacity: 1; visibility: visible; }

        footer { text-align: center; padding: 60px; opacity: 0.6; font-size: 0.8rem; }
        .foo-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .foo-btn:hover {
        background-color: #0056b3;
        }
    </style>
</head>
<body>
<div id="videoPage">
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <nav>
        <a onclick="scrollToSection('info')">Инфо</a>
        <a onclick="scrollToSection('video')">Видео</a>
        <button class="theme-btn" onclick="toggleTheme()">Темная</button>
    </nav>
    
    <header id="header">
        <h1>Mедиа</h1>
    </header>
    
    <section id="info">
        <div class="container reveal">
        <h2>Инфо</h1>
        <p>Эта страница создана для хранения видео самых разных типов и катигорий</p>
        </div>
    </section>
    
    <section id="video">
        <div class="container reveal">
        <h2>Видео</h2>
        <img src="gupka bob.png" style="width: 100%; height: auto; border-radius: 15px;"/>
        </div>
    </section>
    
    <footer><a href="index.html" onclick="event.preventDefault(); location.replace(this.href);" class="foo-btn">&copy; 2026 v0koten</a>
    </footer>
    
    <button id="backToTop" class="back-to-top" onclick="scrollToSection('header')">↑</button>
</div>

    <script>
        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButton(newTheme);
        }

        function updateButton(theme) {
            const btn = document.querySelector('.theme-btn');
            if (btn) btn.textContent = theme === 'dark' ? ' Светлая' : 'Темная';
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateButton(savedTheme);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    const id = entry.target.getAttribute('id');
                    document.querySelectorAll('nav a').forEach(link => {
                        link.classList.remove('active-link');
                        if (id && link.getAttribute('onclick').includes(`'${id}'`)) link.classList.add('active-link');
                    });
                }
            });
        }, { threshold: 0.1 }); // Уменьшен порог срабатывания до 10%

        document.querySelectorAll('.reveal, header, section').forEach(el => observer.observe(el));

        // Кнопка наверх
        window.addEventListener('scroll', () => {
            const btt = document.getElementById('backToTop');
            if (window.scrollY > 300) btt.classList.add('show');
            else btt.classList.remove('show');
        });
    </script>
</body>
</html>
